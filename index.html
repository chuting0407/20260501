<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位素養小超人訓練營</title>
    <!-- 保留 Tailwind CDN，讓樣式能正常運作 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            background-attachment: fixed; /* 讓背景固定，往下捲動時不重複拼貼 */
            background-size: cover; /* 確保背景填滿整個螢幕 */
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100%; 
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: transparent; /* 讓 body 透明，才不會蓋住 html 的背景 */
            font-family: 'Microsoft JhengHei', sans-serif;
        }
        .cute-card {
            border: 8px solid #ffffff;
            box-shadow: 0 20px 0 rgba(0,0,0,0.05);
        }
        .progress-fill {
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="m-0 p-0"> <!-- 取消預設的邊距，避免超出 100vh 產生白線 -->
    <!-- Vue 專案的根節點 -->
    <div id="app"></div>

    <!-- ★ 最關鍵的一行：告訴 HTML 去載入 Vite 的 main.js 與 App.vue ★ -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
